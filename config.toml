theme = "tokyonight"


[keys.normal]
"A-j" = ["extend_to_line_bounds", "delete_selection", "paste_after"]
"A-k" = ["extend_to_line_bounds", "delete_selection", "move_line_up", "paste_before"]
"{" = "goto_prev_paragraph"
"}" = "goto_next_paragraph"

[keys.select]
"A-j" = ["extend_to_line_bounds", "delete_selection", "paste_after"]
"A-k" = ["extend_to_line_bounds", "delete_selection", "move_line_up", "paste_before"]
"{" = "goto_prev_paragraph"
"}" = "goto_next_paragraph"

[editor]
auto-format = true

[editor.cursor-shape]
insert = "bar"
normal = "block"
select = "block"
